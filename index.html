<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Portal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark"></div>
        <span class="logo-text">ClientPortal</span>
      </div>
    </div>

    <nav class="nav">
      <a class="nav-item active" data-view="dashboard" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </a>
      <a class="nav-item" data-view="documents" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Documents
      </a>
      <a class="nav-item" data-view="messages" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Messages
        <span class="nav-badge" id="msg-badge">3</span>
      </a>
      <a class="nav-item" data-view="settings" href="#">
        <svg class="nav-icon" viewBox="0 0 24 24">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        Settings
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-avatar" id="sidebar-avatar">JD</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-name">Jane Doe</div>
        <div class="user-role">Client</div>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <h1 class="topbar-title" id="topbar-title">Dashboard</h1>
      <div class="topbar-actions">
        <button class="topbar-btn" title="Notifications">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-dot"></span>
        </button>
        <div class="topbar-avatar" id="topbar-avatar">JD</div>
      </div>
    </header>

    <!-- Content -->
    <div class="content">

      <!-- === DASHBOARD VIEW === -->
      <section class="view active" id="view-dashboard">
        <p class="greeting" id="greeting"></p>

        <!-- Stat cards -->
        <div class="stat-grid" id="stat-grid"></div>

        <!-- Timeline + Project info -->
        <div class="two-col">
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">Recent Updates</span>
            </div>
            <div class="timeline" id="timeline"></div>
          </div>
          <div class="panel">
            <div class="panel-header">
              <span class="panel-title">Project Details</span>
            </div>
            <div class="detail-list" id="project-details"></div>
          </div>
        </div>
      </section>

      <!-- === DOCUMENTS VIEW === -->
      <section class="view" id="view-documents">
        <div class="panel full-panel">
          <div class="panel-header">
            <span class="panel-title">Your Documents</span>
            <span class="panel-sub">All files shared with you</span>
          </div>
          <div class="doc-list" id="doc-list"></div>
        </div>
      </section>

      <!-- === MESSAGES VIEW === -->
      <section class="view" id="view-messages">
        <div class="chat-wrap">
          <div class="chat-header">
            <div class="chat-with">
              <div class="chat-avatar-sm">AR</div>
              <div>
                <div class="chat-name">Alex Rivera</div>
                <div class="chat-status"><span class="online-dot"></span> Online</div>
              </div>
            </div>
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-footer">
            <input class="chat-input" id="chat-input" type="text"
                   placeholder="Type a message…" autocomplete="off" />
            <button class="chat-send" id="chat-send">
              <svg viewBox="0 0 24 24" width="16" height="16">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <!-- === SETTINGS VIEW === -->
      <section class="view" id="view-settings">
        <div class="panel full-panel" id="settings-panel"></div>
      </section>

    </div><!-- .content -->
  </main>

</div>
<script src="app.js"></script>
</body>
</html>
